# version: '3.8'

services:
  db:
    image: mariadb:11
    container_name: automovilismo_db
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MARIADB_DATABASE=${MARIADB_DATABASE}
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"

  apache-php-crud:
    build: ./
    container_name: automovilismo_web
    depends_on:
      - db
    env_file: .env
    volumes:
      - ./src:/var/www/html 
    ports:
      - "80:80"
volumes:
  mariadb_data: